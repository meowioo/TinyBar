// tbclient.PollInfo
syntax = "proto3";
option java_package = "com.example.tinybar.tieba.proto";
option java_multiple_files = true;

message PollInfo {
    int32 is_multi = 2;
    int64 total_num = 3;
    message PollOption {
        int64 num = 2;
        string text = 3;
    }
    repeated PollOption options = 9;
    int64 total_poll = 11;
    string title = 12;
}
